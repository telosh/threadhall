# Cloud Build（threadhall-dev GCP プロジェクト）: ルート Dockerfile → `npm run build` + ランタイム `npm run start`。
# Cloud Run が参照する Artifact と一致させるため、既定で次のパスへ push する。
#   asia-northeast1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/threadhall/threadhall-dev:$TAG
#
# compose の web のみ Dockerfile.dev（`npm run dev`）。GCP へはそのイメージを載せない。
#
# 手動実行例（プロジェクトが threadhall-dev のとき PROJECT_ID と一致する）:
#   gcloud config set project threadhall-dev
#   gcloud builds submit --config cloudbuild.dev.yaml \
#     --substitutions=SHORT_SHA="$(git rev-parse HEAD)"
#
# カスタム（別サービス／別イメージパスへ出したいとき）の例:
#   --substitutions=_SERVICE=別名,_IMAGE=グループ名/別名
#
# 注意: 「ソースから継続的デプロイ」で自動ビルドする場合、この YAML をトリガーの構成ファイルにすると
#   コンソールの Run と同じレジストリ・サービスへデプロイしやすい。

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: asia-northeast1
  _AR_HOSTNAME: asia-northeast1-docker.pkg.dev
  # Cloud Run が push 済みとして参照している Artifact Registry のリポジトリ名。
  _AR_REPO: cloud-run-source-deploy
  # コンテナ画像の名前（サービスYAMLの image の「リポジトリ以降」を REPO で除いた部分）
  _IMAGE: threadhall/threadhall-dev
  # Cloud Run のサービス名（gcloud run deploy の第1引数）
  _SERVICE: threadhall-dev

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - "-f"
      - Dockerfile
      - "-t"
      - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_IMAGE:$SHORT_SHA"
      - "-t"
      - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_IMAGE:latest"
      - .

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_IMAGE:$SHORT_SHA"

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_IMAGE:latest"

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - "--image=$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_IMAGE:$SHORT_SHA"
      - "--region=$_REGION"
      - "--platform=managed"
      - "--command=npm"
      - "--args=run"
      - "--args=start"
      - "--quiet"

images:
  - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_IMAGE:$SHORT_SHA"
  - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_IMAGE:latest"
