# Cloud Build（threadhall-dev）: ルート Dockerfile → standalone（`npm run build` + `node server.js`）。
# 「Cloud Run で next dev」を避け、検証環境でも本番相当の起動方式に揃える。
#
# compose だけが Dockerfile.dev（`npm run dev`）を利用する。
#
#   gcloud config set project threadhall-dev
#   gcloud builds submit --config cloudbuild.dev.yaml \
#     --substitutions=_REGION=asia-northeast1,_AR_HOSTNAME=asia-northeast1-docker.pkg.dev,_AR_REPO=threadhall,_SERVICE=threadhall-app
#

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: asia-northeast1
  _AR_HOSTNAME: asia-northeast1-docker.pkg.dev
  _AR_REPO: threadhall
  _SERVICE: threadhall-app

steps:
  - id: build
    name: gcr.io/cloud-builders/docker
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - "-f"
      - Dockerfile
      - "-t"
      - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_SERVICE-dev:$SHORT_SHA"
      - "-t"
      - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_SERVICE-dev:latest"
      - .

  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_SERVICE-dev:$SHORT_SHA"

  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_SERVICE-dev:latest"

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - "--image=$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_SERVICE-dev:$SHORT_SHA"
      - "--region=$_REGION"
      - "--platform=managed"
      - "--quiet"

images:
  - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_SERVICE-dev:$SHORT_SHA"
  - "$_AR_HOSTNAME/$PROJECT_ID/$_AR_REPO/$_SERVICE-dev:latest"
