name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    env:
      # Next ビルド時に Better Auth が libSQL を初期化する。.env.local が無い CI では必須。
      TURSO_DATABASE_URL: file:/tmp/threadhall-ci.db
      BETTER_AUTH_SECRET: "01234567890123456789012345678901"
      BETTER_AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Apply DB migrations (CI SQLite file)
        run: |
          rm -f /tmp/threadhall-ci.db
          npm run db:migrate
          npm run db:status

      - run: npm run lint

      - run: npm run typecheck

      - run: npm run test

      - run: npm run build
